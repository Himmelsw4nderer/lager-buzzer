<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kolpingjugend | LagerBuzzer</title>
        <style>
            /* Kolpingjugend Corporate Design Colors */
            :root {
                --kolping-orange: #ea5b0c;
                --kolping-black: #1a1a1a;
                --bg-color: #f4f6f8;
                --card-bg: #ffffff;
                --disabled-color: #a0a0a0;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            body {
                background: var(--bg-color);
                color: var(--kolping-black);
                min-height: 100vh;
                padding-bottom: 40px;
            }

            /* Header */
            header {
                background: var(--kolping-black);
                color: #fff;
                padding: 20px;
                text-align: center;
                border-bottom: 5px solid var(--kolping-orange);
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            h1 {
                font-size: 2.2em;
                font-weight: 300;
            }
            h1 strong {
                color: var(--kolping-orange);
                font-weight: 800;
            }

            .container {
                max-width: 1100px;
                margin: 30px auto;
                padding: 0 20px;
            }

            /* Winner Display */
            .winner-display {
                background: var(--card-bg);
                padding: 40px;
                border-radius: 12px;
                text-align: center;
                margin-bottom: 30px;
                box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
                border: 2px solid transparent;
                transition: all 0.3s ease;
            }
            .winner-display.has-winner {
                border-color: var(--kolping-orange);
                animation: pulse-border 1.5s infinite;
            }
            .winner-title {
                font-size: 1.1em;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: #666;
                margin-bottom: 10px;
            }
            .winner-name {
                font-size: 4em;
                font-weight: 800;
                color: var(--kolping-black);
            }
            .has-winner .winner-name {
                color: var(--kolping-orange);
            }

            @keyframes pulse-border {
                0% {
                    box-shadow: 0 0 0 0 rgba(234, 91, 12, 0.4);
                }
                70% {
                    box-shadow: 0 0 0 15px rgba(234, 91, 12, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(234, 91, 12, 0);
                }
            }

            /* Global Controls */
            .controls {
                display: flex;
                gap: 15px;
                margin-bottom: 40px;
                justify-content: center;
            }
            .btn {
                padding: 15px 30px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                font-size: 1.1em;
                text-transform: uppercase;
                transition:
                    transform 0.1s,
                    opacity 0.2s;
            }
            .btn:active {
                transform: scale(0.97);
            }
            .btn-primary {
                background: var(--kolping-orange);
                color: white;
            }
            .btn-primary:hover {
                background: #d04d0a;
            }
            .btn-secondary {
                background: var(--kolping-black);
                color: white;
            }
            .btn-secondary:hover {
                background: #333;
            }

            /* Buzzer Grid */
            .section-title {
                margin-bottom: 15px;
                font-size: 1.5em;
                border-bottom: 2px solid #ddd;
                padding-bottom: 5px;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }

            .card {
                background: var(--card-bg);
                border-radius: 10px;
                padding: 20px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                border-left: 6px solid var(--kolping-orange);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .card.disabled {
                border-left-color: var(--disabled-color);
                opacity: 0.6;
                background: #fdfdfd;
            }

            .card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 15px;
            }
            .card-header h3 {
                font-size: 1.4em;
                word-break: break-all;
                margin-right: 10px;
            }

            .icon-btn {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 1.2em;
                color: #666;
                transition: color 0.2s;
            }
            .icon-btn:hover {
                color: var(--kolping-orange);
            }

            .card-body p {
                font-size: 0.9em;
                color: #555;
                margin-bottom: 5px;
            }

            .card-actions {
                margin-top: 20px;
                display: flex;
                gap: 10px;
            }
            .btn-small {
                padding: 8px 12px;
                font-size: 0.9em;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
                width: 100%;
            }
            .btn-disable {
                background: #feebeb;
                color: #d32f2f;
            }
            .btn-enable {
                background: #e8f5e9;
                color: #2e7d32;
            }
            .btn-disable:hover {
                background: #fcd5d5;
            }
            .btn-enable:hover {
                background: #c8e6c9;
            }

            /* Top Status Bar */
            .status-bar {
                display: flex;
                justify-content: space-between;
                font-size: 0.85em;
                color: #666;
                margin-bottom: 20px;
                font-weight: bold;
            }
            .status-indicator.online {
                color: #2e7d32;
            }
            .status-indicator.offline {
                color: #d32f2f;
            }
        </style>
    </head>
    <body>
        <header>
            <h1><strong>Kolping</strong>jugend LagerBuzzer</h1>
        </header>

        <div class="container">
            <div class="status-bar">
                <span
                    >Broker Status:
                    <span id="mqtt-status" class="status-indicator"
                        >Verbinde...</span
                    ></span
                >
                <span>Aktive Geräte: <span id="total-buzzers">0</span></span>
            </div>

            <div class="winner-display" id="winner-box">
                <div class="winner-title">Aktueller Gewinner</div>
                <div class="winner-name" id="round-winner">
                    WARTE AUF BUZZER...
                </div>
            </div>

            <div class="controls">
                <button
                    class="btn btn-primary"
                    onclick="triggerAction('reset')"
                >
                    Runde Neustarten
                </button>
                <button
                    class="btn btn-secondary"
                    onclick="triggerAction('lock')"
                >
                    Buzzer Sperren
                </button>
            </div>

            <h2 class="section-title">Team Übersicht</h2>
            <div class="grid" id="buzzers-container">
                <!-- Buzzer Cards will be injected here -->
            </div>
        </div>

        <script>
            async function fetchSystemState() {
                try {
                    // Fetch Stats
                    const statsRes = await fetch("/api/stats");
                    const stats = await statsRes.json();

                    const mqttEl = document.getElementById("mqtt-status");
                    mqttEl.innerText = stats.mqtt_connected
                        ? "ONLINE"
                        : "OFFLINE";
                    mqttEl.className =
                        "status-indicator " +
                        (stats.mqtt_connected ? "online" : "offline");
                    document.getElementById("total-buzzers").innerText =
                        stats.total_buzzers;

                    // Fetch Buzzers (to get the names before determining the winner text)
                    const buzzersRes = await fetch("/api/buzzers");
                    const buzzers = await buzzersRes.json();

                    // Handle Winner UI
                    const winnerBox = document.getElementById("winner-box");
                    const winnerNameEl =
                        document.getElementById("round-winner");

                    if (stats.round.winner && buzzers[stats.round.winner]) {
                        winnerBox.classList.add("has-winner");
                        winnerNameEl.innerText =
                            buzzers[stats.round.winner].name;
                    } else if (stats.round.locked) {
                        winnerBox.classList.remove("has-winner");
                        winnerNameEl.innerText = "GESPERRT";
                    } else {
                        winnerBox.classList.remove("has-winner");
                        winnerNameEl.innerText = "WARTE AUF BUZZER...";
                    }

                    // Render Buzzer Cards
                    const container =
                        document.getElementById("buzzers-container");
                    container.innerHTML = "";

                    Object.values(buzzers).forEach((buzzer) => {
                        const isWinner =
                            stats.round.winner === buzzer.client_id;
                        const cardClass = buzzer.enabled
                            ? "card"
                            : "card disabled";

                        container.innerHTML += `
                        <div class="${cardClass}" ${isWinner ? 'style="border-color: #ea5b0c; background: #fff8f5;"' : ""}>
                            <div>
                                <div class="card-header">
                                    <h3>${buzzer.name}</h3>
                                    <button class="icon-btn" onclick="renameBuzzer('${buzzer.client_id}', '${buzzer.name}')" title="Umbenennen">✏️</button>
                                </div>
                                <div class="card-body">
                                    <p>ID: ${buzzer.client_id}</p>
                                    <p>Treffer: <strong>${buzzer.buzz_count}</strong></p>
                                </div>
                            </div>
                            <div class="card-actions">
                                ${
                                    buzzer.enabled
                                        ? `<button class="btn-small btn-disable" onclick="toggleBuzzer('${buzzer.client_id}', false)">🔴 Deaktivieren</button>`
                                        : `<button class="btn-small btn-enable" onclick="toggleBuzzer('${buzzer.client_id}', true)">🟢 Aktivieren</button>`
                                }
                            </div>
                        </div>
                    `;
                    });
                } catch (err) {
                    console.error("Fehler beim Laden der Daten:", err);
                }
            }

            async function triggerAction(actionName) {
                await fetch("/api/round", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: actionName }),
                });
                fetchSystemState();
            }

            async function renameBuzzer(clientId, currentName) {
                // Using prompt prevents the live-refresh from deleting the user's input while they type
                const newName = prompt(
                    "Neuen Team-Namen eingeben:",
                    currentName,
                );
                if (
                    newName &&
                    newName.trim() !== "" &&
                    newName !== currentName
                ) {
                    await fetch("/api/buzzers/" + clientId, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name: newName.trim() }),
                    });
                    fetchSystemState();
                }
            }

            async function toggleBuzzer(clientId, targetState) {
                await fetch("/api/buzzers/" + clientId, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ enabled: targetState }),
                });
                fetchSystemState();
            }

            // Poll every 500ms
            setInterval(fetchSystemState, 500);
            window.onload = fetchSystemState;
        </script>
    </body>
</html>
