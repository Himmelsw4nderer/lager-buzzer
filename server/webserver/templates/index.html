<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LagerBuzzer - MQTT Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #16213e;
            margin-bottom: 30px;
        }
        h1 {
            color: #0f3460;
            font-size: 2.5em;
            background: linear-gradient(90deg, #0f3460, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #0f3460;
            font-size: 1.1em;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #16213e;
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid #0f3460;
        }
        .stat-card .label {
            font-size: 0.9em;
            color: #0f3460;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #e94560;
        }
        .mqtt-status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .mqtt-connected {
            background: #00ff88;
            color: #000;
        }
        .mqtt-disconnected {
            background: #ff4444;
            color: #fff;
        }
        .events-container {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #0f3460;
        }
        .event-list {
            max-height: 600px;
            overflow-y: auto;
        }
        .event-card {
            background: #1a1a2e;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #e94560;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85em;
            color: #0f3460;
        }
        .event-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        .field {
            background: #0f3460;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .field-label {
            color: #e94560;
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 3px;
            display: block;
        }
        .field-value {
            color: #fff;
        }
        .timestamp {
            color: #00ff88;
            font-size: 0.85em;
        }
        .refresh-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        .refresh-btn:hover {
            background: #c81e45;
        }
        .loading {
            color: #e94560;
            font-style: italic;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #0f3460;
        }
        @media (max-width: 768px) {
            .stats {
                flex-direction: column;
            }
            .stat-card {
                width: 100%;
            }
            .event-body {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>LagerBuzzer</h1>
        <p class="subtitle">Real-time MQTT Event Viewer</p>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="label">Total Events</div>
                <div class="value" id="totalEvents">0</div>
            </div>
            <div class="stat-card">
                <div class="label">MQTT Status</div>
                <div class="value">
                    <span id="mqttStatus" class="mqtt-status mqtt-disconnected">Disconnected</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="label">Subscribed To</div>
                <div class="value" style="font-size: 0.9em;">lagerbuzzer/buzz</div>
            </div>
        </div>

        <div class="events-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Buzz Events</h2>
                <button class="refresh-btn" onclick="refreshEvents()">Refresh</button>
            </div>
            <div id="eventList" class="event-list">
                <div class="empty-state">
                    <p>No events yet. Waiting for MQTT messages...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatTimestamp(unixTimestamp) {
            const date = new Date(unixTimestamp * 1000);
            return date.toLocaleString();
        }

        function formatRuntime(millis) {
            const seconds = (millis / 1000).toFixed(3);
            return seconds + 's';
        }

        function displayEvents(events) {
            const eventList = document.getElementById('eventList');

            if (events.length === 0) {
                eventList.innerHTML = '<div class="empty-state"><p>No events yet. Waiting for MQTT messages...</p></div>';
                return;
            }

            let html = '';
            events.forEach(event => {
                const payload = event.payload;
                const received = new Date(event.timestamp_received * 1000);

                html += `
                    <div class="event-card">
                        <div class="event-header">
                            <span class="timestamp">Received: ${received.toLocaleTimeString()}</span>
                            <span>${event.topic}</span>
                        </div>
                        <div class="event-body">
                            <div class="field">
                                <span class="field-label">Time Sync</span>
                                <span class="field-value">${payload.time_sync || 'N/A'}</span>
                            </div>
                            <div class="field">
                                <span class="field-label">Time Sync Received</span>
                                <span class="field-value">${formatRuntime(payload.time_sync_received || 0)}</span>
                            </div>
                            <div class="field">
                                <span class="field-label">Button Press</span>
                                <span class="field-value">${formatRuntime(payload.button_press || 0)}</span>
                            </div>
                            <div class="field">
                                <span class="field-label">Send Timestamp</span>
                                <span class="field-value">${formatRuntime(payload.send_timestamp || 0)}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            eventList.innerHTML = html;
        }

        async function fetchEvents() {
            try {
                const response = await fetch('/api/events');
                if (response.ok) {
                    const events = await response.json();
                    displayEvents(events);
                }
            } catch (error) {
                console.error('Error fetching events:', error);
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                if (response.ok) {
                    const stats = await response.json();
                    document.getElementById('totalEvents').textContent = stats.total_events;

                    const statusEl = document.getElementById('mqttStatus');
                    if (stats.mqtt_connected) {
                        statusEl.textContent = 'Connected';
                        statusEl.className = 'mqtt-status mqtt-connected';
                    } else {
                        statusEl.textContent = 'Disconnected';
                        statusEl.className = 'mqtt-status mqtt-disconnected';
                    }
                }
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        function refreshEvents() {
            fetchEvents();
            fetchStats();
        }

        // Auto-refresh every 2 seconds
        setInterval(refreshEvents, 2000);

        // Initial load
        window.onload = function() {
            refreshEvents();
        };
    </script>
</body>
</html>
