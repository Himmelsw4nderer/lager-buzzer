<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LagerBuzzer - Management System</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: #1a1a2e;
                color: #e0e0e0;
                min-height: 100vh;
                padding: 20px;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
            }
            header {
                text-align: center;
                padding: 20px 0;
                border-bottom: 2px solid #16213e;
                margin-bottom: 30px;
            }
            h1 {
                background: linear-gradient(90deg, #00ff88, #e94560);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                font-size: 2.5em;
            }

            .stats {
                display: flex;
                gap: 20px;
                margin-bottom: 30px;
                flex-wrap: wrap;
            }
            .stat-card {
                background: #16213e;
                padding: 15px 25px;
                border-radius: 10px;
                border: 1px solid #0f3460;
                flex: 1;
                min-width: 200px;
            }
            .stat-card .label {
                font-size: 0.9em;
                color: #888;
                text-transform: uppercase;
            }
            .stat-card .value {
                font-size: 1.8em;
                font-weight: bold;
                color: #e94560;
            }

            .winner-display {
                background: linear-gradient(135deg, #16213e, #0f3460);
                padding: 30px;
                border-radius: 15px;
                border: 2px solid #e94560;
                text-align: center;
                margin-bottom: 30px;
            }
            .winner-name {
                font-size: 3.5em;
                font-weight: bold;
                color: #00ff88;
                text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            }

            .round-controls {
                display: flex;
                gap: 15px;
                margin-bottom: 30px;
            }
            .btn {
                padding: 12px 24px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                font-size: 1em;
            }
            .btn-primary {
                background: #e94560;
                color: white;
            }
            .btn-secondary {
                background: #0f3460;
                color: white;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }
            .card {
                background: #16213e;
                border: 1px solid #0f3460;
                border-radius: 10px;
                padding: 20px;
            }
            .card h3 {
                color: #00ff88;
                margin-bottom: 10px;
            }
            .badge {
                padding: 3px 8px;
                border-radius: 5px;
                font-size: 0.8em;
                background: #e94560;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>LagerBuzzer Control Panel</h1>
                <p>MQTT Real-Time Event Management System</p>
            </header>

            <div class="stats">
                <div class="stat-card">
                    <div class="label">Broker Status</div>
                    <div class="value" id="mqtt-status">Disconnecting...</div>
                </div>
                <div class="stat-card">
                    <div class="label">Active Devices</div>
                    <div class="value" id="total-buzzers">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Hits This Session</div>
                    <div class="value" id="total-events">0</div>
                </div>
            </div>

            <div class="winner-display">
                <div
                    style="
                        text-transform: uppercase;
                        letter-spacing: 2px;
                        color: #fff;
                        margin-bottom: 5px;
                    "
                >
                    Current Winner
                </div>
                <div class="winner-name" id="round-winner">WAITING...</div>
            </div>

            <div class="round-controls">
                <button
                    class="btn btn-primary"
                    onclick="triggerAction('reset')"
                >
                    Reset Round / Unlock
                </button>
                <button
                    class="btn btn-secondary"
                    onclick="triggerAction('lock')"
                >
                    Lock Buzzer Inputs
                </button>
            </div>

            <h2 style="margin-bottom: 15px">Registered Buzzers</h2>
            <div class="grid" id="buzzers-container"></div>
        </div>

        <script>
            async function fetchSystemState() {
                try {
                    // Get general stats
                    const statsRes = await fetch("/api/stats");
                    const stats = (await statsRes.getJson)
                        ? await statsRes.getJson()
                        : await statsRes.json();

                    document.getElementById("mqtt-status").innerText =
                        stats.mqtt_connected ? "CONNECTED" : "OFFLINE";
                    document.getElementById("mqtt-status").style.color =
                        stats.mqtt_connected ? "#00ff88" : "#ff4444";
                    document.getElementById("total-buzzers").innerText =
                        stats.total_buzzers;
                    document.getElementById("total-events").innerText =
                        stats.total_events;

                    // Get round results
                    const roundRes = await fetch("/api/round");
                    const round = await roundRes.json();
                    const winnerEl = document.getElementById("round-winner");

                    if (round.winner) {
                        winnerEl.innerText = round.winner.toUpperCase();
                    } else {
                        winnerEl.innerText = "WAITING FOR BUZZ...";
                    }

                    // Get explicit list of all items
                    const buzzersRes = await fetch("/api/buzzers");
                    const buzzers = await buzzersRes.json();
                    const container =
                        document.getElementById("buzzers-container");
                    container.innerHTML = "";

                    Object.values(buzzers).forEach((buzzer) => {
                        const isWinner = round.winner === buzzer.client_id;
                        container.innerHTML += `
                        <div class="card" style="border-color: ${isWinner ? "#00ff88" : "#0f3460"}">
                            <h3>${buzzer.name}</h3>
                            <p style="font-size:0.85em; color:#888;">ID: ${buzzer.client_id}</p>
                            <p style="margin-top: 10px;">Hits: <strong>${buzzer.buzz_count}</strong></p>
                            <p>IP: ${buzzer.ip_address || "Unknown"}</p>
                            <div style="margin-top:10px;">
                                <span class="badge" style="background: ${buzzer.enabled ? "#0f3460" : "#ff4444"}">
                                    ${buzzer.enabled ? "Enabled" : "Disabled"}
                                </span>
                            </div>
                        </div>
                    `;
                    });
                } catch (err) {
                    console.error("Error updates tracking loop state:", err);
                }
            }

            async function triggerAction(actionName) {
                await fetch("/api/round", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: actionName }),
                });
                fetchSystemState();
            }

            // Poll variables continuously every 400ms for sharp responsiveness
            setInterval(fetchSystemState, 400);
            window.onload = fetchSystemState;
        </script>
    </body>
</html>
