services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped
  timesync:
    build: ./timesync
    container_name: timesync_publisher
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=lagerbuzzer/time_sync
      - INTERVAL_MS=5000
    depends_on:
      - mosquitto
    restart: unless-stopped
  discovery:
    build: ./discovery
    container_name: discovery
    # Host networking is required so this container can see broadcast
    # packets arriving on the Pi's real interface (wlan0/eth0) - Docker's
    # bridge networking only forwards unicast traffic addressed to the
    # host's own IP, never broadcasts. No DNS/other-container access is
    # needed here, so losing Docker's embedded DNS under host networking
    # is a non-issue.
    network_mode: host
    environment:
      - DISCOVERY_PORT=42424
    restart: unless-stopped
  webserver:
    build: ./webserver
    container_name: webserver
    profiles: ["webserver"]
    ports:
      - "5000:5000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_BUZZ_TOPIC=lagerbuzzer/buzz
      - MQTT_LED_TOPIC_TEMPLATE=lagerbuzzer/{buzzer_id}/led
      - WEB_PORT=5000
    depends_on:
      - mosquitto
    restart: unless-stopped
  soundboard:
    build: ./soundboard
    container_name: soundboard
    profiles: ["soundboard"]
    ports:
      - "5001:5000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_BUZZ_TOPIC=lagerbuzzer/buzz
      - WEB_PORT=5000
    volumes:
      - ./soundboard/sounds:/app/sounds
      - ./soundboard/modes.json:/app/modes.json
    devices:
      - "/dev/snd:/dev/snd"
    depends_on:
      - mosquitto
    restart: unless-stopped
