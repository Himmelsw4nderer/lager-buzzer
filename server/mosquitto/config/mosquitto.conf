# Simple Mosquitto configuration - completely open, no authentication
# This allows anonymous access from any client

# Listen on all interfaces
listener 1883

# Allow anonymous access (no username/password required)
allow_anonymous true

# Enable persistence to store messages when server restarts
persistence true
persistence_location /mosquitto/data/

# Log configuration
log_dest file /mosquitto/log/mosquitto.log
log_type all

# Maximum connections
max_connections 1000

# Maximum incoming message size (bytes)
max_inflight_messages 2000
message_size_limit 10485760
